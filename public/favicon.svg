<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Circular badge with deep slate color -->
  <circle cx="256" cy="256" r="240" fill="#0f172a" stroke="#f59e0b" stroke-width="12" />
  
  <!-- Stylized Tanker & Trailer silhouette -->
  <g fill="#f59e0b">
    <!-- Cabin (front) of truck -->
    <path d="M120,290 L180,290 L180,210 L150,210 L120,250 Z" />
    <rect x="184" y="270" width="16" height="20" fill="#64748b" /> <!-- Coupling / connection -->
    
    <!-- Tanker body (long cylinder) -->
    <rect x="200" y="190" width="200" height="100" rx="20" />
    <!-- Tanker highlights or bands -->
    <rect x="240" y="190" width="10" height="100" fill="#fbbf24" opacity="0.8" />
    <rect x="350" y="190" width="10" height="100" fill="#fbbf24" opacity="0.8" />
  </g>
  
  <!-- Cabin Window (dark blue/slate) -->
  <polygon points="152,220 170,220 170,245 142,245" fill="#1e293b" />
  
  <!-- Wheels with elegant rim detailing -->
  <!-- Cab wheel -->
  <circle cx="150" cy="310" r="30" fill="#1e293b" stroke="#e2e8f0" stroke-width="6" />
  <circle cx="150" cy="310" r="10" fill="#e2e8f0" />
  
  <!-- Trailer wheels (double axle) -->
  <circle cx="260" cy="310" r="30" fill="#1e293b" stroke="#e2e8f0" stroke-width="6" />
  <circle cx="260" cy="310" r="10" fill="#e2e8f0" />
  
  <circle cx="340" cy="310" r="30" fill="#1e293b" stroke="#e2e8f0" stroke-width="6" />
  <circle cx="340" cy="310" r="10" fill="#e2e8f0" />
</svg>
